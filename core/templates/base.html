{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Test Stock</title>
    <link rel="stylesheet" href="{% static 'css/cadastro_produto.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <div class="logo-nome">📦 Test Stock</div>

    <div class="search-container">
        <input type="text"
               name="q"
               placeholder="Buscar produtos..."
               hx-get="{% url 'cadastro_de_produtos' %}"
               hx-trigger="keyup changed delay:400ms"
               hx-target="#resultado">
    </div>

    <div class="user-menu">
        <details>
            <summary class="user-trigger">
                <div class="avatar">US</div>
                Usuário
            </summary>
            <menu class="menu">
                <a href="#">Perfil</a>
                <a href="{% url 'logout' %}">Sair</a>
            </menu>
        </details>
    </div>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<script src="https://unpkg.com/htmx.org@1.9.12"></script>
</body>
</html>
